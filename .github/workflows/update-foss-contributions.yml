name: Update FOSS contributions page

on:
  workflow_dispatch:
  schedule:
    # Runs daily at 06:30 UTC
    - cron: "30 6 * * *"

permissions:
  contents: write

concurrency:
  group: update-foss-contributions
  cancel-in-progress: false

env:
  GITHUB_USER: zbalkan
  EXCLUDED_USERS: "zbalkan"
  EXCLUDED_ORGS: "DeltaZulu-OU"
  SINCE_DATE: "2016-01-01"
  MIN_STARS: "2"
  OUTPUT_FILE: "_pages/foss.md"

jobs:
  update-foss-contributions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate FOSS contributions page
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 <<'PY'
          import json
          import os
          import re
          import subprocess
          import sys
          from collections import defaultdict
          from datetime import datetime, timezone

          github_user = os.environ["GITHUB_USER"]
          excluded_users = os.environ["EXCLUDED_USERS"].split()
          excluded_orgs = os.environ["EXCLUDED_ORGS"].split()
          since_date = os.environ["SINCE_DATE"]
          min_stars = int(os.environ.get("MIN_STARS", "0"))
          output_file = os.environ["OUTPUT_FILE"]

          exclusion_terms = []
          exclusion_terms.extend(f"-user:{user}" for user in excluded_users)
          exclusion_terms.extend(f"-org:{org}" for org in excluded_orgs)
          exclusion_query = " ".join(exclusion_terms)

          search_query = (
              f"is:closed is:pr author:{github_user} "
              f"archived:false {exclusion_query} "
              f"merged:>{since_date}"
          )

          graphql_query = """
          query($searchQuery: String!, $cursor: String) {
            search(query: $searchQuery, type: ISSUE, first: 100, after: $cursor) {
              issueCount
              pageInfo {
                hasNextPage
                endCursor
              }
              nodes {
                ... on PullRequest {
                  title
                  url
                  number
                  createdAt
                  closedAt
                  merged
                  mergedAt
                  repository {
                    name
                    nameWithOwner
                    stargazerCount
                    owner {
                      login
                    }
                  }
                }
              }
            }
          }
          """

          def run_gh_graphql(query, search_query, cursor=None):
              cmd = [
                  "gh", "api", "graphql",
                  "-f", f"query={query}",
                  "-F", f"searchQuery={search_query}",
              ]

              if cursor:
                  cmd.extend(["-F", f"cursor={cursor}"])

              result = subprocess.run(
                  cmd,
                  text=True,
                  capture_output=True,
                  check=False,
              )

              if result.returncode != 0:
                  print(result.stdout, file=sys.stdout)
                  print(result.stderr, file=sys.stderr)
                  raise SystemExit(result.returncode)

              data = json.loads(result.stdout)

              if data.get("errors"):
                  print(json.dumps(data["errors"], indent=2), file=sys.stderr)
                  raise SystemExit(1)

              return data

          def table_cell(value):
              value = "" if value is None else str(value)
              value = re.sub(r"\s+", " ", value).strip()
              return value.replace("|", "\\|")

          print(f"Using query: {search_query}")
          print(f"Minimum stars for summary table: {min_stars}")

          prs = []
          cursor = None
          issue_count = None

          while True:
              data = run_gh_graphql(graphql_query, search_query, cursor)
              search = data["data"]["search"]

              if issue_count is None:
                  issue_count = search.get("issueCount")

              for node in search["nodes"]:
                  if not node:
                      continue

                  if not node.get("merged"):
                      continue

                  if not node.get("mergedAt"):
                      continue

                  prs.append(node)

              page_info = search["pageInfo"]

              if not page_info["hasNextPage"]:
                  break

              cursor = page_info["endCursor"]

          grouped = defaultdict(list)

          for pr in prs:
              repo = pr["repository"]
              owner = repo["owner"]["login"]
              name = repo["name"]
              full_name = repo["nameWithOwner"]
              stars = repo.get("stargazerCount") or 0

              grouped[(owner, name, full_name, stars)].append({
                  "title": pr["title"],
                  "url": pr["url"],
                  "number": pr["number"],
                  "mergedAt": pr.get("mergedAt") or "",
                  "createdAt": pr.get("createdAt") or "",
              })

          total_prs = len(prs)
          total_repos = len(grouped)

          summary_repos = [
              key for key in grouped.keys()
              if key[3] >= min_stars
          ]

          summary_prs_count = sum(len(grouped[key]) for key in summary_repos)
          summary_repos_count = len(summary_repos)
          generated_at = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")

          lines = []
          lines.append("---")
          lines.append("layout: single")
          lines.append("permalink: /foss/")
          lines.append('title: "Contributions"')
          lines.append("---")
          lines.append("")
          lines.append(
              "This page summarizes merged pull requests I have contributed to "
              "third-party open-source repositories. It excludes repositories under "
              "`zbalkan` and `DeltaZulu-OU`."
          )
          lines.append("")
          lines.append(f"Generated: {generated_at}")

          if issue_count is not None and issue_count != total_prs:
              lines.append("")
              lines.append(
                  f"Note: GitHub search reported **{issue_count}** matching items before "
                  f"post-filtering. The generated list contains **{total_prs}** merged pull requests."
              )

          lines.append("")
          lines.append("## Repository Summary")
          lines.append("")
          lines.append("| Repository | Stars ★ | Merged PRs | Latest merged PR |")
          lines.append("|---|---:|---:|---|")

          for owner, name, full_name, stars in sorted(
              summary_repos,
              key=lambda x: (-x[3], -len(grouped[x]), x[2].lower())
          ):
              repo_prs = sorted(
                  grouped[(owner, name, full_name, stars)],
                  key=lambda p: p["mergedAt"],
                  reverse=True
              )

              latest = repo_prs[0]
              latest_date = latest["mergedAt"][:10] if latest["mergedAt"] else ""
              latest_link = f"[#{latest['number']}]({latest['url']})"

              lines.append(
                  f"| [`{table_cell(full_name)}`](https://github.com/{full_name}) | "
                  f"**{stars}** | {len(repo_prs)} | {latest_link} merged {latest_date} |"
              )

          lines.append(
              f"| **Total shown** |  | **{summary_prs_count}** | "
              f"**{summary_repos_count} repositories shown / {total_repos} total repositories, "
              f"{total_prs} total merged PRs found** |"
          )

          lines.append("")
          lines.append("## Pull Requests by Repository")
          lines.append("")

          for owner, name, full_name, stars in sorted(
              grouped.keys(),
              key=lambda x: (x[0].lower(), x[1].lower())
          ):
              repo_url = f"https://github.com/{full_name}"
              lines.append(f"### [{full_name}]({repo_url})")
              lines.append("")
              lines.append("| PR | Title | Merged |")
              lines.append("|---:|---|---|")

              repo_prs = sorted(
                  grouped[(owner, name, full_name, stars)],
                  key=lambda p: p["mergedAt"],
                  reverse=True
              )

              for pr in repo_prs:
                  merged_date = pr["mergedAt"][:10] if pr["mergedAt"] else ""
                  title = table_cell(pr["title"])
                  lines.append(
                      f"| [#{pr['number']}]({pr['url']}) | {title} | {merged_date} |"
                  )

              lines.append("")

          lines.append("")
          lines.append(f"Query: `{search_query}`")
          lines.append("{: .notice}")
          lines.append("")

          output_dir = os.path.dirname(output_file)
          if output_dir:
              os.makedirs(output_dir, exist_ok=True)

          with open(output_file, "w", encoding="utf-8", newline="\n") as f:
              f.write("\n".join(lines).rstrip() + "\n")
          PY

      - name: Commit updated page
        run: |
          if [ -z "$(git status --porcelain -- "$OUTPUT_FILE")" ]; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "$OUTPUT_FILE"
          git commit -m "Update FOSS contributions page"
          git push
